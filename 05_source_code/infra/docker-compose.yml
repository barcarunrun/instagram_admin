name: instagram-ops-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-instagram_ops}
      POSTGRES_USER: ${POSTGRES_USER:-instagram}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-instagram}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-instagram} -d ${POSTGRES_DB:-instagram_ops}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  backend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      PORT: 4000
      CORS_ORIGIN: http://localhost:${FRONTEND_PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-instagram}:${POSTGRES_PASSWORD:-instagram}@postgres:5432/${POSTGRES_DB:-instagram_ops}
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET:-local-dev-jwt-secret}
      ACCESS_TOKEN_EXPIRES_IN: ${ACCESS_TOKEN_EXPIRES_IN:-3600}
      INSTAGRAM_API_MODE: ${INSTAGRAM_API_MODE:-mock}
      OAUTH_MODE: ${OAUTH_MODE:-mock}
      NOTIFICATION_MODE: ${NOTIFICATION_MODE:-log}
      IG_ACCESS_TOKEN: ${IG_ACCESS_TOKEN:-}
      IG_USER_ID: ${IG_USER_ID:-}
      IG_PAGE_ID: ${IG_PAGE_ID:-}
      IG_ACCOUNT_NAME: ${IG_ACCOUNT_NAME:-}
      IG_PAGE_NAME: ${IG_PAGE_NAME:-}
      MEDIA_STORAGE_MODE: ${MEDIA_STORAGE_MODE:-local}
      AZURE_STORAGE_CONNECTION_STRING: ${AZURE_STORAGE_CONNECTION_STRING:-}
      AZURE_STORAGE_CONTAINER_NAME: ${AZURE_STORAGE_CONTAINER_NAME:-media-assets}
      MOCK_OAUTH_CALLBACK_URL: http://localhost:${BACKEND_PORT:-4000}/api/local/oauth/callback
      MOCK_OAUTH_EXPECTED_STATE: ${MOCK_OAUTH_EXPECTED_STATE:-mock_state_demo}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      - ../backend:/app
      - backend-node-modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  frontend:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --hostname 0.0.0.0 --port 3000"
    environment:
      NODE_ENV: development
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:${BACKEND_PORT:-4000}/api
      SERVER_API_BASE_URL: http://backend:4000/api
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ../frontend:/app
      - frontend-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then((response) => process.exit(response.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  worker:
    image: node:22-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    environment:
      NODE_ENV: development
      WORKER_CONCURRENCY: ${WORKER_CONCURRENCY:-1}
      API_BASE_URL: http://backend:4000/api
      DATABASE_URL: postgresql://${POSTGRES_USER:-instagram}:${POSTGRES_PASSWORD:-instagram}@postgres:5432/${POSTGRES_DB:-instagram_ops}
      REDIS_URL: redis://redis:6379
      INSTAGRAM_API_MODE: ${INSTAGRAM_API_MODE:-mock}
      NOTIFICATION_MODE: ${NOTIFICATION_MODE:-log}
      IG_USER_ID: ${IG_USER_ID:-}
    volumes:
      - ../worker:/app
      - worker-node-modules:/app/node_modules
    depends_on:
      backend:
        condition: service_healthy
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres-data:
  redis-data:
  backend-node-modules:
  frontend-node-modules:
  worker-node-modules: